<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Finder Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* Telegram Native UI Parity & Theme Synchronizer */
        *{box-sizing:border-box;margin:0;padding:0}
        
        :root {
            --bg: var(--tg-theme-bg-color, #141414);
            --bg2: var(--tg-theme-secondary-bg-color, #000);
            --bg3: #2b2b2b;
            --accent: var(--tg-theme-button-color, #e50914);
            --text: var(--tg-theme-text-color, #fff);
            --muted: var(--tg-theme-hint-color, #808080);
            --border: rgba(128, 128, 128, 0.2);
            --card: var(--tg-theme-secondary-bg-color, #181818);
        }
        
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom: 30px;-webkit-user-select:none;user-select:none;}
        
        /* Header section */
        .topbar{background:var(--bg2);padding:15px 4%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom: 1px solid var(--border);backdrop-filter:blur(10px);gap:10px;}
        .logo{font-size:18px;font-weight:900;letter-spacing:1px;color:var(--accent);display:flex;align-items:center;gap:8px;white-space:nowrap;}
        .nf-icon{background:var(--accent);color:#fff;padding:2px 7px;border-radius:3px;font-size:18px;line-height:1}
        .settings-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--text);outline:none;cursor:pointer;}

        /* Search Layout */
        .search-zone{padding:15px 4%;background:var(--bg);position:sticky;top:54px;z-index:90;box-shadow:0 4px 6px rgba(0,0,0,0.15);}
        .search-row{display:flex;gap:10px;margin-bottom:12px;}
        .search-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 15px;color:var(--text);font-size:15px;outline:0}
        .search-input:focus{border-color:var(--accent)}
        .search-btn{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:0 22px;font-weight:700;cursor:pointer;font-size:15px;}

        .filters{display:flex;gap:8px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn{background:var(--card);border:1px solid var(--border);padding:8px 16px;font-weight:700;color:var(--muted);cursor:pointer;border-radius:20px;font-size:13px;transition:0.2s;}
        .filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
        
        /* Grid Engine — Rebuilt 21 Layout Matrix */
        .main{padding:15px 4% 0;max-width:1400px;margin:0 auto}
        .res-grid{display:grid;grid-template-columns:1fr;gap:15px;}
        @media(min-width:480px){.res-grid{grid-template-columns:repeat(2,1fr);}}
        @media(min-width:768px){.res-grid{grid-template-columns:repeat(3,1fr);}}

        .file-card{display:flex;flex-direction:column;background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;position:relative;}
        .poster-box{width:100%;position:relative;background:var(--bg2);padding-top:56.25%;} 
        .mode-none .poster-box{display:none}
        .fc-poster{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:0.3s;}
        
        .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.85);font-size:10px;font-weight:900;padding:3px 7px;border-radius:4px;border:1px solid z-index:2;}
        .badge.primary{color:var(--accent);border-color:var(--accent);}
        .badge.cloud{color:#3399ff;border-color:#3399ff;}
        .badge.archive{color:#aaaaaa;border-color:#aaaaaa;}

        .fc-content{padding:12px;display:flex;flex-direction:column;flex:1}
        .fc-name{font-size:14px;font-weight:700;margin-bottom:6px;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;}
        .fc-meta{font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:500;}
        
        .fc-actions{margin-top:auto;display:flex;gap:8px;}
        .btn{flex:1;text-align:center;padding:12px 0;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:4px;}
        .btn-play{background:var(--text);color:var(--bg);}
        .btn-play:hover{opacity:0.9;}
        .btn-dl{background:rgba(128,128,128,0.15);color:var(--text);border:1px solid var(--border);}

        /* Engine States */
        .empty, .error-state{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;font-weight:500;line-height:1.5;}
        .error-state .error-icon{font-size:42px;margin-bottom:12px}
        .error-state .error-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
        
        .pagination{display:none;justify-content:space-between;padding:25px 0 10px;align-items:center}
        .pg-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer;outline:none;}
        .pg-btn:disabled{opacity:0.3;cursor:not-allowed;}
        
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:30px;font-weight:700;font-size:13px;transition:0.3s;z-index:1000;white-space:nowrap;box-shadow:0 4px 15px rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);}
        .toast.show{transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo"><span class="nf-icon">F</span> FAST FINDER</div>
        <div class="controls-row">
            <select id="posterMode" class="settings-btn" onchange="changePosterMode()">
                <option value="tg">📸 TG Thumb</option>
                <option value="none">⚡ Fast (Text)</option>
            </select>
        </div>
    </div>

    <div class="search-zone">
        <div class="search-row">
            <input type="text" id="q" class="search-input" placeholder="Search movies, series..." enterkeyhint="search">
            <button class="search-btn" onclick="doSearch(0)">Go</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-col="all" onclick="setCol(this)">All Sources</button>
            <button class="filter-btn" data-col="primary" onclick="setCol(this)">Primary</button>
            <button class="filter-btn" data-col="cloud" onclick="setCol(this)">Cloud</button>
            <button class="filter-btn" data-col="archive" onclick="setCol(this)">Archive</button>
        </div>
    </div>

    <div class="main">
        <div class="res-grid" id="results">
            <div class="empty">Type a movie title above to scan database.</div>
        </div>

        <div class="pagination" id="pageBox">
            <button class="pg-btn" id="pBtn" onclick="prev()">◀ Prev</button>
            <span style="font-size:13px; font-weight:700;" id="pgInfo">Page 1</span>
            <button class="pg-btn" id="nBtn" onclick="next()">Next ▶</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ─────────────────────────────────────────────
        // Telegram WebApp Initialization & Sync
        // ─────────────────────────────────────────────
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let curQ = '', curOff = 0, nextOff = '', curCol = 'all', curPage = 1;
        let pMode = localStorage.getItem('miniapp_posterMode') || 'tg';
        document.getElementById('posterMode').value = pMode;

        const INIT_DATA = tg.initData || '';

        function changePosterMode() {
            pMode = document.getElementById('posterMode').value;
            localStorage.setItem('miniapp_posterMode', pMode);
            let resGrid = document.getElementById('results');
            if(pMode === 'none') {
                resGrid.classList.add('mode-none');
            } else {
                resGrid.classList.remove('mode-none');
            }
            if (curQ) doSearch(curOff);
        }

        function setCol(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            curCol = btn.dataset.col;
            if (curQ) doSearch(0);
        }

        function showToast(msg) {
            let t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('q').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch(0);
        });

        // 🔄 THUMBNAIL ERROR RETRY PIPELINE
        function handleThumbError(fileId) {
            const box = document.getElementById(`poster-box-${fileId}`);
            if (box) {
                box.innerHTML = `
                    <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); gap:6px; padding:10px; backdrop-filter:blur(5px);">
                        <span style="font-size:11px; color:var(--muted); text-align:center;">थंबनेल लोड नहीं हुआ (Busy)</span>
                        <button onclick="reloadThumb('${fileId}')" id="btn-rl-${fileId}" 
                                style="background:var(--accent); color:#fff; border:none; padding:6px 12px; border-radius:4px; font-size:11px; font-weight:bold; cursor:pointer; outline:none;">
                            🔄 Retry
                        </button>
                    </div>`;
            }
        }

        async function reloadThumb(fileId) {
            const btn = document.getElementById(`btn-rl-${fileId}`);
            if (btn) { btn.innerText = "Loading..."; btn.disabled = true; }
            const timestamp = new Date().getTime();
            const box = document.getElementById(`poster-box-${fileId}`);
            if (box) {
                box.innerHTML = `<img src="/api/thumb?file_id=${fileId}&retry=true&t=${timestamp}" class="fc-poster" onerror="handleThumbError('${fileId}')">`;
            }
        }

        function showError(type, extra = '') {
            const grid = document.getElementById('results');
            tg.MainButton.hide(); 
            
            let icon = '❌', title = 'Error', msg = extra;
            if (type === 'auth') { icon = '🔒'; title = 'Access Denied'; msg = 'Premium membership is required to access files.<br>Kindly use /plan command in bot PM.'; }
            else if (type === 'rate') { icon = '⏳'; title = 'Too Fast!'; msg = 'Searching throttled. Please wait a moment.'; }
            else if (type === 'init') { icon = '⚠️'; title = 'Security Intercept'; msg = 'This application only functions inside Official Telegram Client App.'; }
            
            grid.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">${icon}</div>
                    <div class="error-title">${title}</div>
                    <div class="error-msg">${msg}</div>
                </div>`;
        }

        // 🔍 ENGINE QUERY DATA FETCHING (FIXED JavaScript Syntax)
        async function doSearch(offset) {
            let q = document.getElementById('q').value.trim();
            if (!q) return showToast("Enter keyword first!");

            if (!INIT_DATA) return showError('init');

            curQ = q; curOff = offset; if (offset === 0) curPage = 1;

            document.getElementById('results').innerHTML = '<div class="empty">Searching database...</div>';
            document.getElementById('pageBox').style.display = 'none';
            
            tg.MainButton.setText("🔍 SCANNING METADATA...");
            tg.MainButton.show();
            tg.MainButton.showProgress();

            try {
                let res = await fetch(
                    `/api/search?q=${encodeURIComponent(q)}&offset=${offset}&col=${curCol}&mode=${pMode}`,
                    { headers: { 'X-Telegram-Init-Data': INIT_DATA } }
                );

                if (res.status === 403) { showError('auth'); return; }
                if (res.status === 429) { showError('rate'); return; }
                if (!res.ok) { showError('generic', `Sync Fail (${res.status})`); return; }

                let d = await res.json();
                if (d.error) {
                    if (d.error.includes('Unauthorized')) { showError('auth'); return; }
                    if (d.error.includes('fast')) { showError('rate'); return; }
                    showError('generic', d.error); return;
                }

                if (!d.results || d.results.length === 0) {
                    tg.MainButton.hide();
                    document.getElementById('results').innerHTML = `<div class="empty">No results found for "${htmlEntities(q)}"</div>`;
                    return;
                }

                let html = '';
                d.results.forEach(f => {
                    let sc = (f.source || 'primary').toLowerCase();
                    let badgeClass = ['primary', 'cloud', 'archive'].includes(sc) ? sc : 'primary';

                    let imgHtml = '';
                    if (pMode !== 'none') {
                        imgHtml = `
                        <div class="poster-box" id="poster-box-${f.file_id}">
                            <img src="${f.tg_thumb}" class="fc-poster" onerror="handleThumbError('${f.file_id}')" loading="lazy">
                        </div>`;
                    }

                    html += `
                    <div class="file-card">
                        <span class="badge ${badgeClass}">${sc.toUpperCase()}</span>
                        ${imgHtml}
                        <div class="fc-content">
                            <div class="fc-name">${htmlEntities(f.name)}</div>
                            <div class="fc-meta">${f.size} • ${f.type}</div>
                            <div class="fc-actions">
                                <button class="btn btn-play" onclick="openStream('${f.file_id}', 'watch')">▶ Play</button>
                                <button class="btn btn-dl" onclick="openStream('${f.file_id}', 'download')">⬇ DL</button>
                            </div>
                        </div>
                    </div>`;
                });

                document.getElementById('results').innerHTML = html;
                nextOff = d.next_offset;

                document.getElementById('pageBox').style.display = 'flex';
                document.getElementById('pBtn').disabled = (offset === 0);
                document.getElementById('nBtn').disabled = !nextOff;
                document.getElementById('pgInfo').innerText = 'Page ' + curPage;

                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                showError('generic', 'Synchronization fail. Check Connection.');
            } finally {
                tg.MainButton.hideProgress();
                tg.MainButton.hide();
            }
        }

        // 🎥 PIPELINE STREAMING BINDING
        async function openStream(fileId, mode) {
            showToast(mode === 'watch' ? '▶ Opening player...' : '⬇ Preparing download...');
            
            tg.MainButton.setText(mode === 'watch' ? "🎬 GENERATING WATCH LINK..." : "📥 GENERATING FAST DOWNLOAD LINK...");
            tg.MainButton.show();
            tg.MainButton.showProgress();
            
            try {
                let res = await fetch('/setup_stream', {
                    method: 'POST',
                    headers: { 
                        'X-Telegram-Init-Data': INIT_DATA,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ file_id: fileId, mode: mode })
                });

                if (res.status === 403) { showToast('🔒 Access denied'); return; }
                if (!res.ok) { showToast('❌ Server busy, try again'); return; }

                let data = await res.json().catch(() => ({}));
                if (data.url) {
                    tg.openLink(window.location.origin + data.url);
                } else {
                    tg.openLink(`${window.location.origin}/setup_stream?file_id=${fileId}&mode=${mode}`);
                }
            } catch (err) {
                tg.openLink(`${window.location.origin}/setup_stream?file_id=${fileId}&mode=${mode}`);
            } finally {
                tg.MainButton.hideProgress();
                tg.MainButton.hide();
            }
        }

        function htmlEntities(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        if(pMode === 'none') document.getElementById('results').classList.add('mode-none');
        function next() { if (nextOff) { curPage++; doSearch(nextOff); } }
        function prev() { if (curPage > 1) { curPage--; doSearch(Math.max(0, curOff - 21)); } }
    </script>
</body>
</html>
